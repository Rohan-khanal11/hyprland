[username]
show_always = true
style_user = "fg:#f0f0f0 bg:#888888"
style_root = "fg:#ff5555 bg:#888888"
format = "[ $user]($style)"

[directory]
style = "fg:#f0f0f0 bg:#888888"
format = "[$path ]($style)"
truncation_length = 3
truncate_to_repo = false
fish_style_pwd_dir_length = 1
home_symbol = ""

[directory.substitutions]
"Documents" = "ůįąô"
"Downloads" = "ůįČć"
"Music" = "ůįĚö"
"Pictures" = "ůįč©"

[git_branch]
symbol = " Ôźė"
